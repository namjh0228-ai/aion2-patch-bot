name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-render:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render health endpoint
        run: |
          echo "Pinging Render..."
          curl --fail --show-error --silent \
            --retry 3 \
            --retry-delay 10 \
            --max-time 90 \
            "https://aion2-patch-bot.onrender.com/health"
          echo ""
          echo "Render ping completed."
